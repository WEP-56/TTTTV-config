name: Sync sources

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-sources
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync sources
        run: python scripts/sync_all_sources.py --timeout 20 --retries 3 --max-age-days 45

      - name: Verify sources
        run: python scripts/verify_sources.py --timeout 20 --max-age-days 45

      - name: Commit and push
        run: |
          if git diff --quiet -- sources.json scripts; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sources.json
          git commit -m "chore: sync sources"
          git push
